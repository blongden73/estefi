<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estefi Panizza Art Direction</title>
    <style>
                            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalMonoWebfont.woff2') format('woff2'),
                    url('NBInternationalMonoWebfont.woff') format('woff');
                font-weight: normal;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalRegularWebfont.woff2') format('woff2'),
                    url('NBInternationalRegularWebfont.woff') format('woff');
                font-weight: normal;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalLightItalicWebfont.woff2') format('woff2'),
                    url('NBInternationalLightItalicWebfont.woff') format('woff');
                font-weight: 300;
                font-style: italic;
                font-display: swap;
            }

            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalItalicWebfont.woff2') format('woff2'),
                    url('NBInternationalItalicWebfont.woff') format('woff');
                font-weight: normal;
                font-style: italic;
                font-display: swap;
            }

            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalBoldWebfont.woff2') format('woff2'),
                    url('NBInternationalBoldWebfont.woff') format('woff');
                font-weight: bold;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalLightWebfont.woff2') format('woff2'),
                    url('NBInternationalLightWebfont.woff') format('woff');
                font-weight: 300;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: 'NB International';
                src: url('NBInternationalBoldItalicWebfont.woff2') format('woff2'),
                    url('NBInternationalBoldItalicWebfont.woff') format('woff');
                font-weight: bold;
                font-style: italic;
                font-display: swap;
            }

        /* --- CSS Variables for the Opposite Wheel Math --- */
        :root {
            --img-h: 25vw;
            --img-gap: 20px; /* Updated to 20px exactly */
        }

        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family:'NB International', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f0f0f0; 
            color: #111;
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- Seamless Teleportation Class --- */
        .no-transition, .no-transition * {
            transition: none !important;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 2rem;
            z-index: 100;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            mix-blend-mode: difference; 
        }

        nav .nav-links {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: inherit;
            text-decoration: none;
        }

        /* --- Split Layout Container --- */
        .split-layout {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* =========================================
           LEFT COLUMN: TEXT (Moves UP, Masked)
           ========================================= */
        .left-col {
            width: 55%;
            height: 100%;
            position: relative;
        }

        .text-mask {
            position: absolute;
            top: 35vh; 
            left: 5vw;
            right: 0;
            bottom: 0; 
            overflow: hidden; 
            padding-top: 2px; 
            margin-top: -2px;
        }

        .text-track {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-item {
            display: flex;
            align-items: center; 
            margin-bottom: 2vh; 
            cursor: pointer;
        }

        .project-title {
            font-size: 4vw;
            font-weight: 500;
            letter-spacing: -2px;
            line-height: 1;
            color: rgba(0, 0, 0, 0.9); 
            transition: color 0.5s ease;
            white-space: nowrap;
        }

        .project-item.active .project-title {
            color: rgba(0, 0, 0, 0.9);
        }

        .project-details {
            margin-left: 2rem; 
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            color: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateX(-15px);
            transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .project-item.active .project-details {
            opacity: 1;
            transform: translateX(0);
            transition-delay: 0.2s; 
        }

        /* =========================================
           RIGHT COLUMN: IMAGES (Moves DOWN, Unmasked)
           ========================================= */
        .right-col {
            width: 45%;
            height: 100%;
            position: relative;
        }

        .image-track {
            position: absolute;
            top: 35vh; 
            left: 0;
            right: 5vw;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .image-wrapper {
            position: absolute;
            left: 0;
            width: 100%;
            height: var(--img-h); 
            transform-origin: center;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
            
            opacity: 0.15; 
            transform: scale(1);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-wrapper.active {
            opacity: 1;
            transform: scale(1);
        }

        .text-overlay-panel {
            background-color: rgb(240 240 240 / 90%);
            position: absolute;
            top: 4vw;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html">Estefi Panizza — Art Direction</a>
        </div>
        <!-- <div class="nav-links">
            <div><a href="mailto:hello@estefipanizza.com">Contact</a></div>
            <div><a href="about.html">About</a></div>
        </div> -->
    </nav>

    <div class="split-layout">
        <div class="left-col">
            <div class="text-mask">
                <div class="text-overlay-panel"></div>
                <div class="text-track" id="text-track"></div>
            </div>
        </div>
        <div class="right-col">
            <div class="image-track" id="image-track"></div>
        </div>
    </div>

    <script>
        const originalProjects = [
            { title: "Sana Jardin", details: "London ", date: "2026", imgSrc: "/new-images/sj-1.jpg" },
            { title: "Bumble", details: "Los Angeles ", date: "2026", imgSrc: "/new-images/bumble-1.jpg" },
            { title: "Spanx NYC", details: "New York ", date: "2026", imgSrc: "/new-images/spanx-1.jpg" },
            { title: "Four Seasons", details: "Miami ", date: "2026", imgSrc: "/new-images/fs-1.jpg" },
            { title: "Spanx PR", details: "Puerto Rico ", date: "2026", imgSrc: "/new-images/spanx-2.jpg" },
            { title: "Death To Stock", details: "Buenos Aires ", date: "2026", imgSrc: "/new-images/dts-1.jpg" }
        ];

        const N = originalProjects.length;
        const infiniteProjects = [...originalProjects, ...originalProjects, ...originalProjects];

        const textTrack = document.getElementById('text-track');
        const imageTrack = document.getElementById('image-track');
        
        let activeIndex = N; 
        let snapTimeout;

        function init() {
            infiniteProjects.forEach((project, index) => {
                // Text Setup
                const textItem = document.createElement('div');
                textItem.classList.add('project-item');
                textItem.innerHTML = `
                    <div class="project-title">${project.title}</div>
                    <div class="project-details">${project.details}<br/>${project.date}</div>
                `;
                textItem.addEventListener('click', () => updateActiveProject(index));
                textTrack.appendChild(textItem);

                // Image Setup
                const imgItem = document.createElement('div');
                imgItem.classList.add('image-wrapper');
                
                // Using the CSS variable gap directly in JS
                imgItem.style.top = `calc(-1 * ${index} * (var(--img-h) + var(--img-gap)))`;
                imgItem.innerHTML = `<img src="${project.imgSrc}" alt="${project.title}">`;
                imageTrack.appendChild(imgItem);
            });

            setTimeout(() => updateActiveProject(N), 100);
        }

        function updateActiveProject(newIndex) {
            activeIndex = newIndex;
            const textItems = document.querySelectorAll('.project-item');
            const imageItems = document.querySelectorAll('.image-wrapper');

            const textOffset = textItems[activeIndex].offsetTop;
            textTrack.style.transform = `translateY(-${textOffset}px)`;
            
            // Reusing the exact exact CSS variables to keep math completely unified
            imageTrack.style.transform = `translateY(calc(${activeIndex} * (var(--img-h) + var(--img-gap))))`;

            textItems.forEach((item, idx) => item.classList.toggle('active', idx === activeIndex));
            imageItems.forEach((item, idx) => item.classList.toggle('active', idx === activeIndex));

            clearTimeout(snapTimeout);
            
            snapTimeout = setTimeout(() => {
                let needsSnap = false;
                let mappedIndex = activeIndex;

                if (activeIndex < N) {
                    mappedIndex = activeIndex + N;
                    needsSnap = true;
                } 
                else if (activeIndex >= 2 * N) {
                    mappedIndex = activeIndex - N;
                    needsSnap = true;
                }

                if (needsSnap) {
                    document.body.classList.add('no-transition');
                    
                    activeIndex = mappedIndex;
                    
                    const snapTextOffset = textItems[activeIndex].offsetTop;
                    textTrack.style.transform = `translateY(-${snapTextOffset}px)`;
                    imageTrack.style.transform = `translateY(calc(${activeIndex} * (var(--img-h) + var(--img-gap))))`;

                    textItems.forEach((item, idx) => item.classList.toggle('active', idx === activeIndex));
                    imageItems.forEach((item, idx) => item.classList.toggle('active', idx === activeIndex));

                    void document.body.offsetWidth; 
                    
                    document.body.classList.remove('no-transition');
                }
            }, 1000); 
        }

        window.addEventListener('resize', () => updateActiveProject(activeIndex));

        init();
    </script>
</body>
</html>
