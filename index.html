<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estefi Panizza Art Direction</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #fff;
            overflow: hidden; /* Hide scrollbars for custom scroll */
            cursor: default;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 2rem;
            z-index: 100;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            mix-blend-mode: difference;
        }

        nav .nav-links {
            display: flex;
            gap: 2rem;
        }

        /* --- Infinite Scroll Container --- */
        .scroll-container {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scroll-list {
            position: absolute;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        /* --- Project Items --- */
        .project-item {
            font-size: 5vw;
            font-weight: 400;
            text-transform: uppercase;
            padding: 1rem 0;
            white-space: nowrap;
            cursor: pointer;
            color: rgba(130, 130, 130, 0.917);
            transition: color 0.3s ease;
        }

        .project-item:hover {
            color: rgba(255, 255, 255, 1);
        }

        .project-details {
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 2rem;
            margin-top: -1rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* --- Hover Image Reveal --- */
        .hover-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 500px;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8);
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 0;
            overflow: hidden;
        }

        .hover-image-container.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .hover-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .hover-image-container img.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Estefi Panizza — Art Direction</div>
        <div class="nav-links">
            <div>Contact</div>
            <div>About</div>
        </div>
    </nav>

    <div class="hover-image-container" id="hover-container">
        <img src="new-images/sj-1.jpg" id="img-1" alt="Fashion 1">
        <img src="new-images/bumble-1.jpg" id="img-2" alt="Fashion 2">
        <img src="new-images/spanx-1.jpg" id="img-3" alt="Fashion 3">
        <img src="new-images/fs-1.jpg" id="img-4" alt="Fashion 4">
        <img src="new-images/spanx-2.jpg" id="img-5" alt="Fashion 4">
        <img src="new-images/dts-1.jpg" id="img-6" alt="Fashion 4">
    </div>

    <div class="scroll-container">
        <div class="scroll-list" id="scroll-list">
            </div>
    </div>

    <script>
        // --- Data Array ---
        const projects = [
            { title: "Sana Jardin", location: "London", year: "2025", imgId: "img-1" },
            { title: "Bumble", location: "Los Angeles", year: "2023", imgId: "img-2" },
            { title: "Spanx", location: "New York", year: "2019", imgId: "img-3" },
            { title: "Four Seasons", location: "Miami / Puerto Rico", year: "2018", imgId: "img-4" },
            { title: "Spanx", location: "Miami / Puerto Rico", year: "2018", imgId: "img-5" },
            { title: "Death To Stock", location: "Buenos Aires", year: "2018", imgId: "img-6" }
        ];

        const scrollList = document.getElementById('scroll-list');
        const hoverContainer = document.getElementById('hover-container');
        const images = hoverContainer.querySelectorAll('img');

        // --- 1. Populate the List (Tripled for infinite looping) ---
        function createListElements() {
            // We loop the array 3 times to ensure there's enough content to scroll infinitely
            for (let i = 0; i < 3; i++) {
                projects.forEach(project => {
                    // Create title
                    const item = document.createElement('div');
                    item.classList.add('project-item');
                    item.textContent = project.title;
                    item.dataset.img = project.imgId;

                    // Create sub-details
                    const details = document.createElement('div');
                    details.classList.add('project-details');
                    details.innerHTML = `<span>${project.location}</span><span>${project.year}</span>`;

                    // Hover Events
                    item.addEventListener('mouseenter', () => activateImage(project.imgId));
                    item.addEventListener('mouseleave', deactivateImage);

                    scrollList.appendChild(item);
                    scrollList.appendChild(details);
                });
            }
        }

        // --- 2. Smooth Infinite Scroll Animation ---
        let currentScroll = 0;
        let speed = 0.8; // Adjust auto-scroll speed here

        function animateScroll() {
            currentScroll -= speed;
            
            // Calculate one-third of the total height (since we multiplied the array by 3)
            const singleSetHeight = scrollList.getBoundingClientRect().height / 3;

            // Reset position to create seamless loop
            if (Math.abs(currentScroll) >= singleSetHeight) {
                currentScroll = 0;
            }

            scrollList.style.transform = `translateY(${currentScroll}px)`;
            requestAnimationFrame(animateScroll);
        }

        // --- 3. Cursor Follow Effect ---
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Move the container using requestAnimationFrame for smoothness could be done, 
            // but direct application here works well for standard usage.
            hoverContainer.style.left = `${mouseX}px`;
            hoverContainer.style.top = `${mouseY}px`;
        });

        function activateImage(imgId) {
            hoverContainer.classList.add('active');
            images.forEach(img => img.classList.remove('active'));
            document.getElementById(imgId).classList.add('active');
            
            // Pause scrolling when hovering (optional, comment out if you want continuous scroll)
            speed = 0.2; 
        }

        function deactivateImage() {
            hoverContainer.classList.remove('active');
            // Resume normal scroll speed
            speed = 0.8; 
        }

        // --- Initialize ---
        createListElements();
        animateScroll();

    </script>
</body>
</html>
